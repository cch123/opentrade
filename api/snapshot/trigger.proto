syntax = "proto3";

package opentrade.snapshot;

option go_package = "github.com/xargin/opentrade/api/gen/snapshot;snapshot";

// -----------------------------------------------------------------------------
// Trigger service snapshot — protobuf form. See ADR-0049.
//
// Wire mirror of trigger/internal/snapshot.Snapshot. Decimals go on-wire
// as strings (empty means "zero", matching decOrEmpty in the Go side so the
// on-disk shape is identical across formats).
// -----------------------------------------------------------------------------

message TriggerSnapshot {
  uint32 version = 1;
  int64  taken_at_ms = 2;
  // offsets are the trigger primary's market-data consumer offsets,
  // partition → next-to-consume. Populated either by the primary itself
  // (legacy path) or by trade-dump shadow from
  // TriggerMarketCheckpointEvent (ADR-0067).
  map<int32, int64> offsets = 3;
  repeated TriggerRecord pending = 4;
  repeated TriggerRecord terminals = 5;
  // OCOByClient: client-supplied idempotency key → engine-assigned group id
  // (ADR-0044).
  map<string, string> oco_by_client = 6;
  // trigger_event_offsets is the per-partition next-to-consume position
  // on the trigger-event topic (ADR-0067). When trade-dump produces the
  // snapshot, this is the shadow's apply cursor for each partition;
  // trigger startup uses it to seek the catch-up consumer. Empty on
  // legacy snapshots (trigger self-produced) — caller falls back to
  // AtStart for catch-up.
  map<int32, int64> trigger_event_offsets = 7;
}

message TriggerRecord {
  uint64 id = 1;
  string client_trigger_id = 2;
  string user_id = 3;
  string symbol = 4;
  uint32 side = 5;
  uint32 type = 6;
  string stop_price = 7;
  string limit_price = 8;
  string qty = 9;
  string quote_qty = 10;
  uint32 tif = 11;
  uint32 status = 12;
  int64  created_at_ms = 13;
  int64  triggered_at_ms = 14;
  uint64 placed_order_id = 15;
  string reject_reason = 16;
  int64  expires_at_ms = 17;                 // ADR-0043
  string oco_group_id = 18;                  // ADR-0044
  // Trailing-stop state (ADR-0045).
  int32  trailing_delta_bps = 19;
  string activation_price = 20;
  string trailing_watermark = 21;
  bool   trailing_active = 22;
}
