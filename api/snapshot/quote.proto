syntax = "proto3";

package opentrade.snapshot;

option go_package = "github.com/xargin/opentrade/api/gen/snapshot;snapshot";

// -----------------------------------------------------------------------------
// Quote engine snapshot — protobuf form. See ADR-0049 (format) + ADR-0036
// (original JSON snapshot for hot restart).
//
// Wire mirror of quote/internal/snapshot.Snapshot. Decimals stay on-wire as
// strings. ADR-0055: Quote no longer maintains orderbook state, so only
// per-symbol kline aggregators + per-partition trade-event offsets are
// snapshotted here.
// -----------------------------------------------------------------------------

message QuoteSnapshot {
  uint32 version = 1;
  int64  taken_at_ms = 2;
  uint64 quote_seq = 3;
  map<int32, int64> offsets = 4;
  map<string, QuoteSymbolState> symbols = 5;  // symbol → state
}

message QuoteSymbolState {
  // tag 1 was QuoteDepth — removed in ADR-0055 (Match owns orderbook now).
  reserved 1;
  reserved "depth";
  QuoteKline kline = 2;

  // last_trade_match_seq is the highest match_seq_id Quote has already
  // folded into its kline / PublicTrade stream for this symbol. Quote
  // uses it to de-duplicate the dual-emit trade-event records
  // introduced in ADR-0058 §2 (the same Trade arrives once on the
  // maker's partition and once on the taker's). On a cold restart the
  // engine needs this or it would re-fold trades that were already
  // applied before the snapshot.
  uint64 last_trade_match_seq = 3;
}

message QuoteKline {
  string symbol = 1;
  map<int32, QuoteBar> bars = 2;   // KlineInterval enum → open bar
}

message QuoteBar {
  int64  open_time_ms = 1;
  int64  close_time_ms = 2;
  string open = 3;
  string high = 4;
  string low = 5;
  string close = 6;
  string volume = 7;
  string quote_volume = 8;
  uint64 count = 9;
}
