syntax = "proto3";

package opentrade.event;

import "event/common.proto";

option go_package = "github.com/xargin/opentrade/api/gen/event;event";

// -----------------------------------------------------------------------------
// counter-journal events — Counter's normalized WAL. See ADR-0004.
//
// Partition key: user_id.
// Consumed by: Counter backup (state replay), trade-dump (MySQL), push (user
// private channel).
// -----------------------------------------------------------------------------

// Snapshot of a balance for a given (user, asset) pair. Included in every
// journal event so that replay / audit can be done without cross-referencing.
//
// Version is the per-(user, asset) monotonic counter (ADR-0048 backlog:
// 双层 version 方案 B). Mirrored by trade-dump to the `accounts` projection
// so downstream readers (BFF cache, reconciliation) can use it as an
// optimistic-lock / cache-invalidation handle.
message BalanceSnapshot {
  string user_id = 1;
  string asset = 2;
  string available = 3;  // decimal string
  string frozen = 4;     // decimal string
  uint64 version = 5;
}

// Event envelope for counter-journal.
//
// counter_seq_id is the counter-shard-scoped monotonic sequence assigned by
// the counter UserSequencer. Used by trade-dump as the per-row idempotency
// guard for accounts / account_logs (see ADR-0028).
//
// account_version is the user-level monotonic counter (bumped on any of
// this user's balance mutations, ADR-0048 backlog: 双层 version 方案 B).
// Sent on every event; unchanged on OrderStatus / CancelRequested which
// don't mutate balances (consumers observe the value but don't advance
// their cached version on such events).
message CounterJournalEvent {
  EventMeta meta = 1;
  uint64 account_version = 2;
  uint64 counter_seq_id = 3;

  oneof payload {
    FreezeEvent       freeze        = 10;
    UnfreezeEvent     unfreeze      = 11;
    SettlementEvent   settlement    = 12;
    TransferEvent     transfer      = 13;
    OrderStatusEvent  order_status  = 14;
    CancelRequested   cancel_req    = 15;

    // Tag 50 reserved for ADR-0060 signalling event (no balance
    // mutation; pure fan-out to downstream consumers):
    //   50: TECheckpointEvent  (ADR-0060, published by the consume-loop
    //       advancer to flag "te_offset <= N fully processed")
    // Tag 51 (OrderEvictedEvent, ADR-0062) is permanently retired by
    // ADR-0063 — terminal OrderStatusEvent now subsumes the evict
    // signal. Do not reuse this tag.
    // Tag 52 is ADR-0064's StartupFenceEvent: a sentinel record
    // Counter emits at startup to force franz-go's lazy
    // InitProducerID + fence the prior owner's pending txn, and to
    // stabilize the partition LEO for trade-dump's on-demand
    // snapshot. Shadow engine and Counter engine both apply it as a
    // no-op — its value is entirely in "existing on the partition".
    TECheckpointEvent te_checkpoint = 50;
    StartupFenceEvent startup_fence = 52;
  }
}

// Funds frozen as result of PlaceOrder.
message FreezeEvent {
  string user_id = 1;
  uint64 order_id = 2;
  string client_order_id = 3;
  string symbol = 4;
  Side side = 5;
  OrderType order_type = 6;
  TimeInForce tif = 7;
  string price = 8;             // decimal; empty for market
  string qty = 9;                // decimal
  string freeze_asset = 10;
  string freeze_amount = 11;    // decimal
  BalanceSnapshot balance_after = 12;
}

// Reverse of freeze (Match rejected, full cancel without fill, etc.).
message UnfreezeEvent {
  string user_id = 1;
  uint64 order_id = 2;
  string asset = 3;
  string amount = 4;
  BalanceSnapshot balance_after = 5;
}

// Settlement of a trade — Counter consumes trade-event and produces this.
message SettlementEvent {
  string user_id = 1;
  uint64 order_id = 2;
  string trade_id = 3;
  string symbol = 4;
  Side side = 5;

  // What happens to balances:
  //   delta_base:   signed change to base asset available
  //   delta_quote:  signed change to quote asset available
  //   unfreeze_base / unfreeze_quote: amount released from frozen
  //   fee_asset / fee_amount: fee paid (deducted from settlement)
  string price = 10;
  string qty = 11;
  string delta_base = 12;
  string delta_quote = 13;
  string unfreeze_base = 14;
  string unfreeze_quote = 15;
  string fee_asset = 16;
  string fee_amount = 17;

  BalanceSnapshot base_balance_after = 20;
  BalanceSnapshot quote_balance_after = 21;
}

// Non-order fund movement (deposit / withdraw / freeze / unfreeze).
message TransferEvent {
  enum TransferType {
    TRANSFER_TYPE_UNSPECIFIED = 0;
    TRANSFER_TYPE_DEPOSIT = 1;
    TRANSFER_TYPE_WITHDRAW = 2;
    TRANSFER_TYPE_FREEZE = 3;
    TRANSFER_TYPE_UNFREEZE = 4;
  }

  string user_id = 1;
  string transfer_id = 2;       // idempotency key
  string asset = 3;
  string amount = 4;
  TransferType type = 5;
  string biz_ref_id = 6;
  string memo = 7;
  BalanceSnapshot balance_after = 8;

  // Populated when the transfer is a leg of an asset-service saga
  // (ADR-0057). For legs driven by AssetHolder RPCs the saga's
  // transfer_id is stamped here so downstream projections can correlate
  // counter-journal entries with transfer_ledger rows in
  // opentrade_asset. Empty for system-level / admin transfers that do
  // not participate in a saga.
  string saga_transfer_id = 9;
}

// Status transition of an order (purely informational for consumers that
// materialize order state, e.g. push / trade-dump).
message OrderStatusEvent {
  string user_id = 1;
  uint64 order_id = 2;
  InternalOrderStatus old_status = 3;
  InternalOrderStatus new_status = 4;
  string filled_qty = 5;
  RejectReason reject_reason = 6; // set when new_status = REJECTED
}

// Cancel has been received by Counter and forwarded to Match.
message CancelRequested {
  string user_id = 1;
  uint64 order_id = 2;
  string symbol = 3;
}

// TECheckpointEvent is published by the ADR-0060 ordered advancer
// when pendingList's consecutive-done prefix advances. It carries the
// largest trade-event offset for which every derived business event
// has already been committed upstream in this counter-journal
// partition. trade-dump's shadow engine uses it as the authoritative
// te_watermark source (ADR-0061 §3).
//
// Payload is intentionally minimal — the Kafka partition ordering
// between this event and the preceding business events is the
// substantive contract. Consumers treat te_checkpoint as a no-op for
// state (no balance / order changes) and only advance their watermark
// bookkeeping.
//
// The envelope's CounterSeqId carries the advancer's latest counterSeq
// at publish time; consumers that track counterSeq monotonicity (e.g.
// shadow engine restore) still see monotonic seqs.
message TECheckpointEvent {
  int32 te_partition = 1;  // = vshard_id; redundant field for debug
  int64 te_offset    = 2;  // largest TE offset whose business events
                           // have all committed on this partition
}

// StartupFenceEvent is emitted once by a Counter instance during its
// startup flow (ADR-0064 §3 Phase 1 step ③) as a sentinel Produce
// inside a new transaction. Its value is NOT the payload — payload is
// no-op — but the mechanical effect of Produce + EndTransaction on the
// counter-journal partition:
//
//   1. Triggers franz-go's lazy InitProducerID call, which causes the
//      broker to fence any prior owner (old ADR-0058 epoch) of the
//      same transactional.id and write an abort marker for its pending
//      transaction to this partition.
//   2. Once the abort marker is down, commit marker for this txn
//      stabilizes partition LEO. trade-dump's on-demand snapshot path
//      (ADR-0064 §2) queries LEO and waits its shadow consumer to
//      apply through it.
//
// Consumers (shadow engine, Counter catchUpJournal, any future journal
// consumer) MUST apply this event as a state no-op — no balance
// change, no order change, no counter_seq advance. CounterJournalEvent
// envelope fields for a sentinel record:
//
//   - meta populated with the emitting Counter's node_id + vshard_id
//   - account_version = 0
//   - counter_seq_id  = 0  (sentinels do not allocate counter_seq)
//
// The node_id + epoch + ts_ms in the payload are for audit only, read
// by operators inspecting the journal (e.g. to correlate a Counter
// restart with its sentinel commit marker).
message StartupFenceEvent {
  string node_id = 1;  // Counter node that emitted this sentinel
  uint64 epoch   = 2;  // ADR-0058 vshard assignment.epoch at emit time
  int64  ts_ms   = 3;  // Counter wall-clock at emit, UNIX ms
}

