syntax = "proto3";

package opentrade.event;

import "event/common.proto";

option go_package = "github.com/xargin/opentrade/api/gen/event;event";

// -----------------------------------------------------------------------------
// asset-journal — asset-service's normalized WAL for the funding-wallet
// biz_line. See ADR-0057.
//
// Role mirrors ADR-0004's counter-journal: every funding-wallet balance
// mutation appends one event here. trade-dump consumes this topic to
// project `funding_accounts` / `funding_account_logs` / `transfers` into
// MySQL for History queries.
//
// Partition key: user_id (so all events for one user land in commit order
// on one partition, identical to counter-journal's partitioning).
//
// Kafka commit strategy: asset-service writes transfer_ledger (MySQL,
// local tx) FIRST, then produces to asset-journal (idempotent producer).
// If the producer fails or the process crashes between the two steps, the
// saga driver re-reads the ledger on startup and re-produces the
// corresponding events; consumers dedup on asset_seq_id.
// -----------------------------------------------------------------------------

// BalanceSnapshot for funding-wallet. Shape identical to
// counter-journal.BalanceSnapshot — re-declared here to keep event/
// packages self-contained per producer and to give each producer its
// own version space (funding_version is independent of counter's
// account_version).
message FundingBalanceSnapshot {
  string user_id = 1;
  string asset = 2;
  string available = 3;  // decimal string
  string frozen = 4;     // decimal string
  uint64 version = 5;    // per-(user, asset) monotonic
}

// Envelope for asset-journal.
//
// asset_seq_id is the asset-shard-scoped monotonic sequence (ADR-0051
// typed sequence naming). Used by trade-dump as the per-row idempotency
// guard for funding_accounts / funding_account_logs.
//
// funding_version is the user-level monotonic counter (bumped on any of
// this user's funding-wallet mutations, mirroring counter's
// account_version field, ADR-0048).
message AssetJournalEvent {
  EventMeta meta = 1;
  uint64 asset_seq_id = 2;
  uint64 funding_version = 3;

  oneof payload {
    FundingTransferOutEvent  xfer_out    = 10;
    FundingTransferInEvent   xfer_in     = 11;
    FundingCompensateEvent   compensate  = 12;
    SagaStateChangeEvent     saga_state  = 13;
  }
}

// Funds debited from funding wallet as the `from` side of a saga (or as
// the `to` side when direction is spot→funding — the event type is
// symmetric, the direction is conveyed by peer_biz + sign).
message FundingTransferOutEvent {
  string user_id = 1;
  // saga transfer_id (same value flows through transfer_ledger and the
  // holder's TransferOut idempotency record).
  string transfer_id = 2;
  string asset = 3;
  string amount = 4;            // decimal, always positive
  string peer_biz = 5;           // destination biz_line
  string memo = 6;
  FundingBalanceSnapshot balance_after = 7;
}

// Funds credited to funding wallet as the `to` side of a saga.
message FundingTransferInEvent {
  string user_id = 1;
  string transfer_id = 2;
  string asset = 3;
  string amount = 4;
  string peer_biz = 5;           // source biz_line
  string memo = 6;
  FundingBalanceSnapshot balance_after = 7;
}

// Funds credited back after a compensate. Logically equivalent to
// FundingTransferInEvent but labeled distinctly for audit separation.
message FundingCompensateEvent {
  string user_id = 1;
  string transfer_id = 2;
  string asset = 3;
  string amount = 4;
  string peer_biz = 5;           // biz_line whose TransferIn failed
  string compensate_cause = 6;
  FundingBalanceSnapshot balance_after = 7;
}

// Saga state transition observed by asset-service. Carried on the same
// journal so downstream can project the `transfers` table without a
// separate topic. trade-dump upserts (transfer_id) with last-write-wins
// on asset_seq_id.
message SagaStateChangeEvent {
  string transfer_id = 1;
  string user_id = 2;
  string from_biz = 3;
  string to_biz = 4;
  string asset = 5;
  string amount = 6;
  // String form to keep event/ independent of rpc/asset enum tags.
  // Values: "INIT" / "DEBITED" / "COMPLETED" / "FAILED" / "COMPENSATING"
  // / "COMPENSATED" / "COMPENSATE_STUCK".
  string old_state = 7;
  string new_state = 8;
  string reject_reason = 9;
}
