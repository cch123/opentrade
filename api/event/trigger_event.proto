syntax = "proto3";

package opentrade.event;

import "event/common.proto";

option go_package = "github.com/xargin/opentrade/api/gen/event;event";

// -----------------------------------------------------------------------------
// trigger-event topic — append-only stream of trigger-order state
// transitions plus trade-dump-bound metadata events. See ADR-0047 +
// ADR-0067.
//
// Partition key: user_id (so trade-dump sees events for a given trigger
// in commit order). Checkpoint events (ADR-0067) carry no business
// state and may use any key; the trigger producer keys them on a
// constant for partition-0 affinity.
//
// Wire format: TriggerEvent envelope with `oneof payload {
// TriggerUpdate update = 10; TriggerMarketCheckpointEvent
// market_checkpoint = 20; }`. Consumers dispatch by payload variant.
// MySQL projection ignores anything that isn't TriggerUpdate.
//
// Flow:
//   trigger service         Kafka topic         trade-dump             MySQL
//   --------------------         -------------      --------------         ------
//   state change in engine ───▶  trigger-event ───▶ journal consumer ──▶ triggers table (upsert, seq-guarded)
//   periodic ticker        ───▶  trigger-event ───▶ shadow consumer  ──▶ market_offsets in next snapshot
//
// Each TriggerUpdate carries the *post-change* full snapshot of the
// trigger so trade-dump can idempotently upsert by id with
// last-write-wins on trigger_seq_id. That keeps the projection robust
// against duplicate emissions during HA handover — the consumer side
// dedups by trigger_seq_id without needing producer transactions.
//
// Enums mirror the rpc/trigger.proto values 1:1. They are redeclared
// here (with `EVENT_` prefix) to keep event/ from depending on rpc/; the
// mapping is trivial and asserted by unit tests.
// -----------------------------------------------------------------------------

// TriggerEvent is the wire envelope for every record on the
// trigger-event topic (ADR-0067). Existing producers / consumers wrap
// their payloads in this envelope; tag numbers leave room for future
// payload kinds without breaking ordering.
message TriggerEvent {
  oneof payload {
    TriggerUpdate update = 10;
    TriggerMarketCheckpointEvent market_checkpoint = 20;
  }
}

// TriggerEventType parallels rpc/trigger.TriggerType. Keep int
// values in sync.
enum TriggerEventType {
  TRIGGER_EVENT_TYPE_UNSPECIFIED = 0;
  TRIGGER_EVENT_TYPE_STOP_LOSS = 1;
  TRIGGER_EVENT_TYPE_STOP_LOSS_LIMIT = 2;
  TRIGGER_EVENT_TYPE_TAKE_PROFIT = 3;
  TRIGGER_EVENT_TYPE_TAKE_PROFIT_LIMIT = 4;
  TRIGGER_EVENT_TYPE_TRAILING_STOP_LOSS = 5;
}

// TriggerEventStatus parallels rpc/trigger.TriggerStatus.
enum TriggerEventStatus {
  TRIGGER_EVENT_STATUS_UNSPECIFIED = 0;
  TRIGGER_EVENT_STATUS_PENDING = 1;
  TRIGGER_EVENT_STATUS_TRIGGERED = 2;
  TRIGGER_EVENT_STATUS_CANCELED = 3;
  TRIGGER_EVENT_STATUS_REJECTED = 4;
  TRIGGER_EVENT_STATUS_EXPIRED = 5;
}

// TriggerUpdate is the post-change full snapshot of one trigger.
//
// trigger_seq_id is a service-global monotonic id assigned by the
// trigger service (sharded by trigger id space is not required;
// the service runs as a single logical shard today). trade-dump uses it
// as the upsert guard on the triggers table.
message TriggerUpdate {
  EventMeta meta = 1;

  uint64 id = 2;
  string client_trigger_id = 3;
  string user_id = 4;
  string symbol = 5;
  Side side = 6;
  TriggerEventType type = 7;

  // Trigger threshold + order shape.
  string stop_price = 8;
  string limit_price = 9;
  string qty = 10;
  string quote_qty = 11;
  TimeInForce tif = 12;

  // Terminal / observable fields.
  TriggerEventStatus status = 13;
  int64 created_at_unix_ms = 14;
  int64 triggered_at_unix_ms = 15;
  uint64 placed_order_id = 16;     // populated after TRIGGERED
  string reject_reason = 17;       // populated on REJECTED
  int64 expires_at_unix_ms = 18;   // 0 = never expires

  // OCO group id (empty = standalone).
  string oco_group_id = 19;

  // Trailing-stop observable state.
  int32 trailing_delta_bps = 20;
  string activation_price = 21;
  string trailing_watermark = 22;
  bool trailing_active = 23;

  uint64 trigger_seq_id = 24;
}

// TriggerMarketCheckpointEvent advances trade-dump's view of the trigger
// service's market-data consumer position (ADR-0067). Trigger primary
// produces one of these periodically; trade-dump's trigger shadow keeps
// the latest map and stamps it onto the snapshot so a restored trigger
// resumes its market-data consumer at the right partition offsets
// (ADR-0048: snapshot + offset must travel together).
//
// Apply has no business effect on trigger state — it only advances the
// `market_offsets` field the shadow holds locally.
//
// Mirrors ADR-0060 TECheckpointEvent for counter-journal.
message TriggerMarketCheckpointEvent {
  // market_offsets is partition → next-to-consume offset on the
  // market-data topic the trigger primary subscribes to.
  map<int32, int64> market_offsets = 1;
  int64 ts_unix_ms = 2;
}
