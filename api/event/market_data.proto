syntax = "proto3";

package opentrade.event;

import "event/common.proto";

option go_package = "github.com/xargin/opentrade/api/gen/event;event";

// -----------------------------------------------------------------------------
// market-data — Match (OrderBook Full/Delta) + Quote (PublicTrade/Kline) →
// Push / BFF clients / analytics subscribers.
//
// Partition key: symbol. See:
//   ADR-0021 (Quote as standalone service for PublicTrade/Kline)
//   ADR-0055 (Match as orderbook authority; Full + Delta same stream)
// -----------------------------------------------------------------------------

// Seq fields identify which producer stamped the frame:
//   - quote_seq_id: stamped by Quote for PublicTrade / Kline* payloads.
//   - match_seq_id: stamped by Match for OrderBook payloads (ADR-0051).
// Exactly one of the two is non-zero on any given event.
message MarketDataEvent {
  EventMeta meta = 1;
  string symbol = 2;
  uint64 quote_seq_id = 3;
  uint64 match_seq_id = 4;

  oneof payload {
    PublicTrade public_trade = 10;
    KlineUpdate kline_update = 11; // current (open) bar, updated on every trade
    KlineClosed kline_closed = 12; // bar has closed — value is final
    OrderBook   order_book   = 15; // Match-authoritative Full or Delta (ADR-0055)
  }
}

// Public trade — a trade stripped of private identities. Direct forward from
// trade-event.Trade with maker/taker user ids removed.
message PublicTrade {
  string trade_id = 1;
  string symbol = 2;
  string price = 3;
  string qty = 4;
  Side taker_side = 5;
  int64 ts_unix_ms = 6;
}

// Kline interval — the windows Quote aggregates.
enum KlineInterval {
  KLINE_INTERVAL_UNSPECIFIED = 0;
  KLINE_INTERVAL_1M  = 1;
  KLINE_INTERVAL_5M  = 2;
  KLINE_INTERVAL_15M = 3;
  KLINE_INTERVAL_1H  = 4;
  KLINE_INTERVAL_1D  = 5;
}

// A single candlestick. open_time_ms / close_time_ms are the interval bounds;
// for an update they are the bounds of the current open bar.
message Kline {
  string symbol = 1;
  KlineInterval interval = 2;
  int64 open_time_ms = 3;   // inclusive
  int64 close_time_ms = 4;  // exclusive (i.e. open_time + interval)
  string open = 5;
  string high = 6;
  string low = 7;
  string close = 8;
  string volume = 9;        // sum of qty
  string quote_volume = 10; // sum of qty * price
  uint64 trade_count = 11;
}

message KlineUpdate { Kline kline = 1; }
message KlineClosed { Kline kline = 1; }

// A single orderbook price level. qty="0" in an OrderBookDelta means the
// level is deleted; OrderBookFull never carries zero-qty levels.
message OrderBookLevel {
  string price = 1;
  string qty = 2;
}

// OrderBookFull — full Top-N state of the book at match_seq_id. Bids are
// descending by price, asks ascending. Cold-start consumers tail the topic
// until they see a Full, then apply subsequent Deltas (ADR-0055).
message OrderBookFull {
  repeated OrderBookLevel bids = 1;
  repeated OrderBookLevel asks = 2;
}

// OrderBookDelta — levels whose qty changed since the previous frame for
// this symbol. qty="0" signals level removal.
message OrderBookDelta {
  repeated OrderBookLevel bids = 1;
  repeated OrderBookLevel asks = 2;
}

// OrderBook — oneof wrapper. Match emits Full periodically (every N deltas
// or T seconds, whichever comes first) and Delta on every orderbook change.
message OrderBook {
  oneof data {
    OrderBookFull  full  = 1;
    OrderBookDelta delta = 2;
  }
}
