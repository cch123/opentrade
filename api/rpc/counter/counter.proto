syntax = "proto3";

package opentrade.rpc.counter;

import "event/common.proto";

option go_package = "github.com/xargin/opentrade/api/gen/rpc/counter;counterrpc";

// -----------------------------------------------------------------------------
// Counter gRPC service. Called by BFF (PlaceOrder / Cancel / Query) and by
// the asset-service saga orchestrator (AssetHolder contract defined in
// api/rpc/assetholder/assetholder.proto — ADR-0057 §3).
//
// Historical note: ADR-0011's `Transfer` RPC was removed as part of ADR-0057
// M4. All user-facing fund movement now flows through asset-service; system-
// level deposit / withdraw / admin top-up is covered by ADR-0057 "Open
// Questions" and has no rpc surface here yet.
// -----------------------------------------------------------------------------

service CounterService {
  // PlaceOrder accepts a new order. The response returns once the order has
  // been persisted to counter-journal and dispatched to Match. The matching
  // outcome is asynchronous — delivered via WS or Query (see ADR-0007).
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);

  // CancelOrder requests cancellation of an existing order. The response
  // returns once the cancel has been forwarded to Match; the final cancel
  // confirmation is asynchronous.
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  // Query an order by id (returns internal status; callers may project to
  // external status). Returns NOT_FOUND if the order does not exist on this
  // shard.
  rpc QueryOrder(QueryOrderRequest) returns (QueryOrderResponse);

  // Query balances for a user.
  rpc QueryBalance(QueryBalanceRequest) returns (QueryBalanceResponse);

  // Reserve moves Available → Frozen for a privileged caller (the
  // conditional-order service, ADR-0041). The ref_id is the idempotency
  // key; repeated Reserve for the same ref_id returns the prior
  // record with accepted=false. Freeze amount is derived from the order
  // shape via the same ComputeFreeze used by PlaceOrder, so Counter
  // stays the single source of truth for freeze math.
  rpc Reserve(ReserveRequest) returns (ReserveResponse);

  // ReleaseReservation moves Frozen → Available and deletes the
  // reservation record. Idempotent: unknown ref_ids return accepted=false
  // without error.
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse);

  // AdminCancelOrders bulk-cancels live orders in this shard that match
  // the filter. At least one of user_id / symbol must be non-empty. The
  // call walks this shard's in-memory OrderStore, filters to active +
  // non-PENDING_CANCEL orders, then runs the normal per-order Cancel
  // path (per-user sequencer) so Match sees the same OrderCancelEvent
  // stream as a user-initiated cancel (ADR-0052).
  //
  // Caller authenticates with an admin-role API-Key (BFF /admin/cancel-
  // orders). Cross-shard fan-out happens at BFF level: if only a symbol
  // is given, BFF calls every shard in parallel.
  rpc AdminCancelOrders(AdminCancelOrdersRequest) returns (AdminCancelOrdersResponse);

  // CancelMyOrders bulk-cancels the caller's own live orders on this
  // shard. user_id is required (and must hash to this shard); symbol is
  // optional — when empty, every active order owned by the user is
  // cancelled. Shares the same per-order Cancel path as CancelOrder /
  // AdminCancelOrders, so Match sees a normal OrderCancelEvent stream
  // and the idempotency rules (PENDING_CANCEL + terminal auto-skip)
  // apply. This is the user-facing counterpart to AdminCancelOrders;
  // BFF routes it to the single shard owning user_id (no fan-out).
  rpc CancelMyOrders(CancelMyOrdersRequest) returns (CancelMyOrdersResponse);
}

// -----------------------------------------------------------------------------
// Place / Cancel
// -----------------------------------------------------------------------------

message PlaceOrderRequest {
  string user_id = 1;
  string client_order_id = 2;                    // optional
  string symbol = 3;
  opentrade.event.Side side = 4;
  opentrade.event.OrderType order_type = 5;
  opentrade.event.TimeInForce tif = 6;
  string price = 7;                              // empty for market
  string qty = 8;                                // base qty; empty for market buy with quote_qty
  // Market buy by quote budget (BN-style quoteOrderQty, ADR-0035).
  // Mutually exclusive with qty for market buy.
  string quote_qty = 9;
  // Reservation id (ADR-0041). When non-empty, Counter consumes the
  // matching reservation instead of freezing fresh funds: it verifies the
  // reservation's (asset, amount) matches what ComputeFreeze would
  // produce for this order, then deletes the reservation and places the
  // order using the already-frozen balance. Only the conditional-order
  // service sets this today.
  string reservation_id = 10;
  // Reference price (ADR-0053 M3.b). Optional. BFF fills this with a
  // best-effort mid-price from its market-data cache so Counter can
  // enforce MARKET-by-base precision filters (MinQuoteAmount etc.) that
  // otherwise have no price to multiply qty against. Empty string =
  // unavailable (BFF has no cached depth yet, e.g. right after restart)
  // → Counter falls back to M3 behaviour (skip MarketByBase check).
  string reference_price = 11;
}

message PlaceOrderResponse {
  uint64 order_id = 1;
  string client_order_id = 2;
  // Whether this is a new order (false means dedup hit — returning the
  // existing active order, see ADR-0015).
  bool accepted = 3;
  int64 received_ts_unix_ms = 4;
}

message CancelOrderRequest {
  string user_id = 1;
  uint64 order_id = 2;
}

message CancelOrderResponse {
  uint64 order_id = 1;
  // True if the cancel was forwarded to Match. The final CANCELED/FILLED
  // result arrives asynchronously.
  bool accepted = 2;
}

// -----------------------------------------------------------------------------
// Query
// -----------------------------------------------------------------------------

message QueryOrderRequest {
  string user_id = 1;
  uint64 order_id = 2;
}

message QueryOrderResponse {
  uint64 order_id = 1;
  string client_order_id = 2;
  string symbol = 3;
  opentrade.event.Side side = 4;
  opentrade.event.OrderType order_type = 5;
  opentrade.event.TimeInForce tif = 6;
  string price = 7;
  string qty = 8;
  string filled_qty = 9;
  string frozen_amt = 10;
  opentrade.event.InternalOrderStatus status = 11;
  int64 created_at_unix_ms = 12;
  int64 updated_at_unix_ms = 13;
}

message QueryBalanceRequest {
  string user_id = 1;
  string asset = 2; // empty means return all assets
}

message QueryBalanceResponse {
  repeated Balance balances = 1;
}

message Balance {
  string asset = 1;
  string available = 2;
  string frozen = 3;
}

// -----------------------------------------------------------------------------
// Reservations (ADR-0041)
// -----------------------------------------------------------------------------

message ReserveRequest {
  string user_id = 1;
  // Caller-generated id; dedup key. Conditional service uses "cond-<id>".
  string reservation_id = 2;
  // Order shape — Counter runs its existing ComputeFreeze on this tuple to
  // derive (asset, amount).
  string symbol = 3;
  opentrade.event.Side side = 4;
  opentrade.event.OrderType order_type = 5;
  string price = 6;                              // for LIMIT
  string qty = 7;
  string quote_qty = 8;                          // market buy
}

message ReserveResponse {
  string reservation_id = 1;
  // Computed by ComputeFreeze.
  string asset = 2;
  string amount = 3;
  // false when the reservation_id was already known (returning the prior
  // asset/amount verbatim so the caller can assert idempotent behaviour).
  bool accepted = 4;
}

message ReleaseReservationRequest {
  string user_id = 1;
  string reservation_id = 2;
}

message ReleaseReservationResponse {
  string reservation_id = 1;
  // true if we released a live reservation; false if we had nothing to
  // release (already consumed by PlaceOrder, already released, or never
  // existed). Either way the client can consider the ref_id "done".
  bool accepted = 2;
  string asset = 3;
  string amount = 4;
}

// -----------------------------------------------------------------------------
// Admin (ADR-0052)
// -----------------------------------------------------------------------------

message AdminCancelOrdersRequest {
  // At least one of user_id / symbol must be non-empty. Both set = filter
  // intersection (this user's orders on this symbol).
  string user_id = 1;
  string symbol = 2;
  // Free-form explanation recorded alongside the admin audit log entry.
  // Does not reach counter-journal; only the BFF audit file sees it.
  string reason = 3;
}

message AdminCancelOrdersResponse {
  // Orders successfully transitioned to PENDING_CANCEL (forwarded to Match).
  uint32 cancelled = 1;
  // Orders that matched the filter but were already terminal / pending cancel.
  uint32 skipped = 2;
  // Numeric shard id (Config.ShardID) so the BFF fan-out can report per-shard.
  int32 shard_id = 3;
}

// -----------------------------------------------------------------------------
// User-facing bulk cancel
// -----------------------------------------------------------------------------

message CancelMyOrdersRequest {
  // Required; must hash to this shard.
  string user_id = 1;
  // Optional; empty means "every active order for this user on this shard".
  string symbol = 2;
}

message CancelMyOrdersResponse {
  // Orders successfully transitioned to PENDING_CANCEL (forwarded to Match).
  uint32 cancelled = 1;
  // Orders that matched but were already terminal / pending cancel.
  uint32 skipped = 2;
}
